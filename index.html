  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #081120;
      --bg-2: #0d1830;
      --text: #f8fbff;
      --muted: #a6b6ce;
      --line: rgba(255,255,255,0.10);
      --glass: rgba(255,255,255,0.08);
      --glass-2: rgba(255,255,255,0.14);
      --blue: #76c8ff;
      --blue-2: #3b82f6;
      --cyan: #35d6ff;
      --purple: #8b5cf6;
      --pink: #ff5dcf;
      --max: 1240px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 25%),
        radial-gradient(circle at top right, rgba(53,214,255,0.10), transparent 22%),
        radial-gradient(circle at bottom left, rgba(139,92,246,0.12), transparent 25%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      border: none;
      outline: none;
      background: none;
      color: inherit;
      cursor: pointer;
      font: inherit;
    }

    .page-wrap {
      position: relative;
      overflow: hidden;
    }

    /* LOADER */
    .loader {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(118,200,255,0.10), transparent 26%),
        linear-gradient(180deg, #060d18, #0a1423);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 99999;
      transition: opacity .9s ease, visibility .9s ease;
    }

    .loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-ring {
      position: relative;
      width: 104px;
      height: 104px;
      margin-bottom: 20px;
    }

    .loader-ring::before,
    .loader-ring::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .loader-ring::after {
      border-top: 1px solid var(--cyan);
      border-right: 1px solid rgba(118,200,255,0.25);
      animation: spinRing 1.4s linear infinite;
    }

    @keyframes spinRing {
      to { transform: rotate(360deg); }
    }

    .loader-logo {
      position: absolute;
      inset: 18px;
      width: calc(100% - 36px);
      height: calc(100% - 36px);
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 0 30px rgba(118,200,255,0.15);
    }

    .loader-brand {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .loader-role {
      margin-top: 6px;
      font-size: 12px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #9ab8db;
    }

    .loader-line {
      width: 180px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      margin-top: 20px;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .loader-line::after {
      content: "";
      position: absolute;
      top: 0;
      left: -25%;
      width: 25%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: lineRun 1.4s ease-in-out infinite;
    }

    @keyframes lineRun {
      0% { left: -25%; opacity: 0; }
      20% { opacity: 1; }
      100% { left: 110%; opacity: 1; }
    }

    /* BACKGROUND */
    .bg-system {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(4,10,18,0.62), rgba(4,10,18,0.86)),
        url('https://i.postimg.cc/WbxyDZHb/A-premium-futuristic-202603201217.jpg') center/cover no-repeat;
      opacity: 0.95;
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: 0.10;
    }

    .wave {
      position: absolute;
      width: 160%;
      height: 260px;
      left: -30%;
      top: 18%;
      background:
        radial-gradient(circle, rgba(118,200,255,0.16), transparent 55%),
        linear-gradient(90deg, transparent, rgba(118,200,255,0.20), transparent);
      filter: blur(16px);
      transform: rotate(-7deg);
      opacity: 0.55;
      animation: waveSweep 12s ease-in-out infinite;
    }

    .wave.two {
      top: 64%;
      height: 220px;
      animation-duration: 15s;
      animation-delay: 2s;
      opacity: 0.38;
    }

    @keyframes waveSweep {
      0% { transform: translateX(-18%) rotate(-7deg); opacity: 0.08; }
      25% { opacity: 0.45; }
      50% { transform: translateX(10%) rotate(-5deg); opacity: 0.38; }
      75% { opacity: 0.5; }
      100% { transform: translateX(34%) rotate(-7deg); opacity: 0.08; }
    }

    .shape {
      position: absolute;
      border: 1px solid rgba(118,200,255,0.18);
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(4px);
      animation: floatShape 10s ease-in-out infinite;
    }

    .shape.one {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      top: 14%;
      right: 10%;
    }

    .shape.two {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      top: 62%;
      left: 8%;
      animation-duration: 13s;
    }

    .shape.three {
      width: 70px;
      height: 70px;
      transform: rotate(45deg);
      top: 32%;
      left: 14%;
      animation-duration: 11s;
    }

    @keyframes floatShape {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.55; }
      50% { transform: translateY(-18px) rotate(8deg); opacity: 0.9; }
    }

    .container {
      width: min(var(--max), calc(100% - 24px));
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(7,16,28,0.52);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .nav-inner {
      width: min(var(--max), calc(100% - 24px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.10);
      flex-shrink: 0;
    }

    .brand-meta {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .brand-name {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.4px;
      color: #f8fbff;
      white-space: nowrap;
    }

    .brand-role {
      font-size: 10px;
      color: #8da9ca;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 2px;
    }

    .nav-links {
      display: none;
    }

    .nav-cta {
      display: none;
    }

    .menu-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #eef5ff;
      font-size: 18px;
      flex-shrink: 0;
    }

    .mobile-menu {
      display: none;
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      flex-direction: column;
      gap: 10px;
    }

    .mobile-menu a {
      color: #d8e5f7;
      font-size: 14px;
      padding: 6px 2px;
    }

    .mobile-menu.show {
      display: flex;
    }

    .hero {
      padding: 58px 0 28px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 26px;
      align-items: center;
      min-height: auto;
    }

    .hero-copy {
      max-width: 100%;
      text-align: left;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);

      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;

      backdrop-filter: blur(8px);
    }

    .hero-brand {
      font-family: 'Outfit', sans-serif;

      font-weight: 700;
      letter-spacing: 2.3px;
      text-transform: uppercase;
      color: #a7c8ec;
      margin-bottom: 8px;

    .hero-role {
      font-size: 11px;
      color: #7f99ba;
      text-transform: uppercase;
      letter-spacing: 2.2px;
      margin-bottom: 16px;
    }

    .hero-title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(34px, 10vw, 64px);
      line-height: 0.98;
      font-weight: 800;
      letter-spacing: -1.4px;

      margin-bottom: 14px;

    .hero-title span {

    .hero-sub {

    .hero-actions {

      gap: 12px;
    }

    .btn-primary,
    .btn-secondary {
      position: relative;
      overflow: hidden;
      border-radius: 999px;
      padding: 15px 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      transition: transform .28s ease, box-shadow .28s ease, background .28s ease;
      width: 100%;
    }

    .btn-primary::before,
    .btn-secondary::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.10), transparent);
      transform: translateX(-120%);
      transition: transform .7s ease;
    }

    .btn-primary:hover::before,
    .btn-secondary:hover::before {
      transform: translateX(120%);
    }

    .btn-primary {
      background: linear-gradient(180deg, rgba(123,194,255,0.24), rgba(61,135,255,0.18));
      border: 1px solid rgba(123,194,255,0.24);
      box-shadow: 0 10px 34px rgba(61,135,255,0.14);
      color: #f8fbff;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #e3edfb;
      backdrop-filter: blur(8px);
    }

    .btn-primary:hover,
    .btn-secondary:hover {
      transform: translateY(-2px) scale(1.01);
    }

    .hero-visual {
      position: relative;
      min-height: auto;
      display: block;
    }

    .glass-preview {
      position: relative;
      width: 100%;
      border-radius: 28px;
      padding: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 80px rgba(0,0,0,0.38);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .glass-preview::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 10%, rgba(255,255,255,0.10) 30%, transparent 55%);
      transform: translateX(-100%);
      animation: sweep 8s ease-in-out infinite;
    }

    @keyframes sweep {
      0% { transform: translateX(-100%); opacity: 0; }
      20% { opacity: 1; }
      60% { transform: translateX(120%); opacity: 1; }
      100% { transform: translateX(120%); opacity: 0; }
    }

    .preview-top {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;

    .preview-label {

      color: #c6d7ee;
    }

    .preview-bars {

    .preview-bars span {

      height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);

    .preview-image {

      object-fit: cover;
      border-radius: 20px;
      display: block;
      border: 1px solid rgba(255,255,255,0.08);

    .floating-tag {

      border-radius: 20px;

    .floating-tag-title {

      letter-spacing: 2px;

      margin-bottom: 8px;
    }

    .floating-tag-text {

      line-height: 1.7;

    }

    .section-head {

    .statement-text {

    .statement-text strong {

    .statement-text em {

    }

    .reveal {
      opacity: 0;
      transform: translateY(26px);
      transition: opacity .8s ease, transform .8s ease;
    }

    .reveal.show {
      opacity: 1;
      transform: translateY(0);
    }

  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        const loader = document.getElementById('loader');
        if (loader) loader.classList.add('hidden');
      }, 1400);
    });

    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    if (menuBtn && mobileMenu) {
      menuBtn.addEventListener('click', function () {
        mobileMenu.classList.toggle('show');
      });

      mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => mobileMenu.classList.remove('show'));
      });
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
        }
      });
    }, { threshold: 0.12 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
