<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProsperMedia — Web Developer</title>
  <meta name="description" content="ProsperMedia designs clean modern websites for ambitious brands. Premium digital experiences with a luxury creative studio feel and high-end tech output." />
  <meta property="og:title" content="ProsperMedia — Web Developer" />
  <meta property="og:description" content="Clean modern websites for ambitious brands." />
  <meta property="og:image" content="https://i.postimg.cc/VNsb4PPN/Prosper-Media-logo-futuristic-202603200954.jpg" />
  <link rel="icon" href="https://i.postimg.cc/VNsb4PPN/Prosper-Media-logo-futuristic-202603200954.jpg" type="image/jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #060d18;
      --bg-2: #0a1423;
      --glass: rgba(255,255,255,0.07);
      --glass-2: rgba(255,255,255,0.10);
      --line: rgba(255,255,255,0.10);
      --text: #f7fbff;
      --muted: #93a3bb;
      --blue: #69b8ff;
      --blue-2: #2f7cff;
      --shadow: 0 20px 80px rgba(0,0,0,0.35);
      --radius: 26px;
      --max: 1220px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(47,124,255,0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(105,184,255,0.08), transparent 32%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      border: none;
      outline: none;
      background: none;
      color: inherit;
      cursor: pointer;
      font: inherit;
    }

    .page-wrap {
      position: relative;
      overflow: hidden;
    }

    /* LOADER */
    .loader {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(47,124,255,0.08), transparent 30%),
        linear-gradient(180deg, #050c16, #091220);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 99999;
      transition: opacity .8s ease, visibility .8s ease;
    }

    .loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-logo {
      width: 74px;
      height: 74px;
      border-radius: 22px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 0 60px rgba(105,184,255,0.18);
      margin-bottom: 20px;
    }

    .loader-brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #f8fbff;
      letter-spacing: 0.5px;
    }

    .loader-role {
      margin-top: 6px;
      font-size: 13px;
      color: #8fa8c7;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .loader-bar {
      width: 180px;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      margin-top: 24px;
      overflow: hidden;
      position: relative;
    }

    .loader-bar::after {
      content: "";
      position: absolute;
      top: 0;
      left: -25%;
      width: 25%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      animation: loaderMove 1.4s ease-in-out infinite;
    }

    @keyframes loaderMove {
      0% { left: -25%; opacity: 0; }
      20% { opacity: 1; }
      100% { left: 110%; opacity: 1; }
    }

    /* TECH BACKGROUND */
    .bg-tech {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-pattern {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: 0.08;
      mask-image: radial-gradient(circle at center, rgba(0,0,0,1), transparent 82%);
      -webkit-mask-image: radial-gradient(circle at center, rgba(0,0,0,1), transparent 82%);
    }

    .wave-light {
      position: absolute;
      width: 160%;
      height: 280px;
      left: -30%;
      top: 18%;
      background:
        radial-gradient(circle, rgba(105,184,255,0.18), transparent 55%),
        linear-gradient(90deg, transparent, rgba(105,184,255,0.20), transparent);
      filter: blur(16px);
      transform: rotate(-7deg);
      opacity: 0.55;
      animation: wavePass 11s ease-in-out infinite;
    }

    .wave-light.two {
      top: 65%;
      height: 240px;
      animation-duration: 14s;
      animation-delay: 2s;
      opacity: 0.35;
    }

    @keyframes wavePass {
      0% { transform: translateX(-18%) rotate(-7deg); opacity: 0.08; }
      25% { opacity: 0.5; }
      50% { transform: translateX(10%) rotate(-5deg); opacity: 0.45; }
      75% { opacity: 0.55; }
      100% { transform: translateX(34%) rotate(-7deg); opacity: 0.08; }
    }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* NAV */
    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(18px);
      background: rgba(6,13,24,0.58);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .nav-inner {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 10px 30px rgba(105,184,255,0.12);
      flex-shrink: 0;
    }

    .brand-meta {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .brand-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #f8fbff;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .brand-role {
      font-size: 11px;
      color: #8fa8c7;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 14px;
      transition: color .3s ease;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .nav-cta {
      padding: 12px 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(105,184,255,0.22), rgba(47,124,255,0.18));
      border: 1px solid rgba(105,184,255,0.25);
      color: #f7fbff;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 10px 40px rgba(47,124,255,0.14);
      transition: transform .25s ease, box-shadow .25s ease;
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06) inset, 0 18px 50px rgba(47,124,255,0.18);
    }

    .menu-btn {
      display: none;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      align-items: center;
      justify-content: center;
      color: #dfe9fa;
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.04);
      font-size: 18px;
    }
    /* HERO */
    .hero {
      padding: 92px 0 60px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 38px;
      align-items: center;
      min-height: 80vh;
    }

    .hero-copy {
      max-width: 720px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #c3d2ea;
      font-size: 12px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      margin-bottom: 24px;
      backdrop-filter: blur(8px);
    }

    .hero-brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #9ebde0;
      margin-bottom: 10px;
    }

    .hero-role {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #7f96b3;
      margin-bottom: 20px;
    }

    .hero-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(42px, 7vw, 82px);
      line-height: 1.02;
      font-weight: 700;
      letter-spacing: -1.7px;
      margin-bottom: 16px;
      color: #f7fbff;
    }

    .hero-title span {
      color: #9fd3ff;
      text-shadow: 0 0 30px rgba(105,184,255,0.15);
    }

    .hero-sub {
      max-width: 640px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
      margin-bottom: 30px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .btn-primary, .btn-secondary {
      border-radius: 999px;
      padding: 15px 22px;
      font-weight: 700;
      font-size: 14px;
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before,
    .btn-secondary::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.10), transparent);
      transform: translateX(-120%);
      transition: transform .6s ease;
    }

    .btn-primary:hover::before,
    .btn-secondary:hover::before {
      transform: translateX(120%);
    }

    .btn-primary {
      background: linear-gradient(180deg, rgba(105,184,255,0.24), rgba(47,124,255,0.2));
      border: 1px solid rgba(105,184,255,0.28);
      color: #f6faff;
      box-shadow: 0 10px 40px rgba(47,124,255,0.14);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      color: #dce8fb;
      backdrop-filter: blur(8px);
    }

    .btn-primary:hover,
    .btn-secondary:hover {
      transform: translateY(-2px) scale(1.01);
    }

    .hero-visual {
      position: relative;
      min-height: 560px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glass-preview {
      position: relative;
      width: 100%;
      max-width: 560px;
      border-radius: 30px;
      padding: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 80px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .glass-preview::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 10%, rgba(255,255,255,0.10) 30%, transparent 55%);
      transform: translateX(-100%);
      animation: panelSweep 8s ease-in-out infinite;
    }

    @keyframes panelSweep {
      0% { transform: translateX(-100%); opacity: 0; }
      20% { opacity: 1; }
      60% { transform: translateX(120%); opacity: 1; }
      100% { transform: translateX(120%); opacity: 0; }
    }

    .preview-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      position: relative;
      z-index: 2;
    }

    .preview-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #c6d7ee;
    }

    .preview-bars {
      display: flex;
      gap: 8px;
    }

    .preview-bars span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
    }

    .preview-image {
      width: 100%;
      height: 390px;
      object-fit: cover;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      z-index: 2;
      display: block;
    }

    .floating-tag {
      position: absolute;
      bottom: -24px;
      left: -16px;
      padding: 18px 20px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 18px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(14px);
      max-width: 320px;
    }

    .floating-tag-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #b5cae7;
      margin-bottom: 8px;
    }

    .floating-tag-text {
      font-size: 14px;
      line-height: 1.65;
      color: #e6f0ff;
      }
    .section {
      padding: 110px 0;
      position: relative;
      z-index: 2;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 34px;
    }

    .section-kicker {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2.4px;
      color: #97b8dd;
      margin-bottom: 10px;
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(26px, 4vw, 46px);
      line-height: 1.08;
      font-weight: 700;
      letter-spacing: -1px;
      color: #f7fbff;
    }

    .section-desc {
      max-width: 560px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    /* STATEMENT */
    .statement {
      padding-top: 36px;
    }

    .statement-panel {
      padding: 34px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 80px rgba(0,0,0,0.22);
    }

    .statement-text {
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.45;
      color: #eaf2ff;
      max-width: 920px;
    }

    .statement-text strong {
      color: #ffffff;
      font-weight: 700;
    }

    .statement-text em {
      color: #8ec6ff;
      font-style: normal;
    }

    /* PROJECTS */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
    }

    .project {
      position: relative;
      border-radius: 26px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      transition: transform .35s ease, border-color .35s ease, box-shadow .35s ease;
      min-height: 100%;
    }

    .project:hover {
      transform: translateY(-6px);
      border-color: rgba(99,179,255,0.28);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .project-image-wrap {
      padding: 14px 14px 0;
    }

    .project-image {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 18px;
      display: block;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .project-body {
      padding: 18px 18px 20px;
    }

    .project-type {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #9cb7d6;
      margin-bottom: 10px;
    }

    .project-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 21px;
      line-height: 1.1;
      font-weight: 700;
      color: #f7fbff;
      margin-bottom: 10px;
    }

    .project-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
      margin-bottom: 18px;
    }

    .project-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #9fd3ff;
      font-size: 14px;
      font-weight: 700;
      transition: opacity .25s ease, transform .25s ease;
    }

    .project-link:hover {
      transform: translateX(3px);
    }

    /* SERVICES */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .service {
      padding: 28px 24px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .service-no {
      font-size: 12px;
      color: #8ba8ca;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .service h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 700;
      color: #f7fbff;
      margin-bottom: 14px;
      max-width: 260px;
    }

    .service p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
      max-width: 320px;
  }
    /* PROCESS */
    .process-track {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
      align-items: start;
    }

    .process-step {
      position: relative;
      padding: 24px 22px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
    }

    .process-index {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      background: linear-gradient(180deg, rgba(99,179,255,0.18), rgba(47,124,255,0.16));
      border: 1px solid rgba(99,179,255,0.2);
      color: #dff0ff;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
    }

    .process-step h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
      color: #f7fbff;
      margin-bottom: 10px;
    }

    .process-step p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    /* WHY */
    .why-wrap {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 26px;
      align-items: stretch;
    }

    .why-main,
    .why-points {
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      padding: 28px;
    }

    .why-main h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(26px, 3vw, 36px);
      line-height: 1.15;
      color: #f7fbff;
      margin-bottom: 14px;
      font-weight: 700;
    }

    .why-main p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.9;
      max-width: 560px;
    }

    .why-list {
      display: grid;
      gap: 18px;
    }

    .why-item {
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .why-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .why-item h4 {
      font-size: 15px;
      font-weight: 700;
      color: #f7fbff;
      margin-bottom: 6px;
      letter-spacing: .2px;
    }

    .why-item p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    /* CTA */
    .cta-section {
      padding-top: 40px;
    }

    .cta-panel {
      position: relative;
      padding: 42px 36px;
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(16px);
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(0,0,0,0.28);
    }

    .cta-panel::after {
      content: "";
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      right: -140px;
      top: -120px;
      background: radial-gradient(circle, rgba(99,179,255,0.18), transparent 70%);
      pointer-events: none;
    }

    .cta-kicker {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #a9c4e7;
      margin-bottom: 12px;

  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        const loader = document.getElementById('loader');
        if (loader) loader.classList.add('hidden');
      }, 1300);
    });

    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    if (menuBtn && mobileMenu) {
      menuBtn.addEventListener('click', function () {
        mobileMenu.classList.toggle('show');
      });

      mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => mobileMenu.classList.remove('show'));
      });
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
        }
      });
    }, { threshold: 0.12 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
